<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bijak Sifir 2025</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    color:white;
    background-size:cover;
    background-position:center;
    transition:0.5s;
}
.container{
    margin-top:40px;
}
button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.choice{
    width:200px;
}
.correct{background:#00cc66;}
.wrong{background:#cc0000;}
.hidden{display:none;}
.box{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}
</style>
</head>
<body>

<audio id="bgmusic" src="music.mp3" loop></audio>
<audio id="betul" src="correct.mp3"></audio>
<audio id="salah" src="wrong.mp3"></audio>

<div class="container">

<div id="menu" class="box">
<h1>🎮 Permainan Bijak Sifir</h1>
<input type="text" id="nama" placeholder="Masukkan Nama"><br><br>
<button onclick="mulaGame(1)">Bahagian 1 (Sifir)</button>
<button onclick="mulaGame(2)">Bahagian 2 (Tukar Unit)</button>
<button onclick="mulaGame(3)">Bahagian 3 (Masalah)</button><br><br>
<button onclick="lihatLeaderboard()">Leaderboard</button>
</div>

<div id="game" class="hidden box">
<h3 id="info"></h3>
<h2 id="soalan"></h2>

<div>
<button class="choice" onclick="jawab(0)"></button>
<button class="choice" onclick="jawab(1)"></button><br>
<button class="choice" onclick="jawab(2)"></button>
<button class="choice" onclick="jawab(3)"></button>
</div>

<p id="status"></p>
<p id="timer"></p>
<p id="skor"></p>
</div>

<div id="result" class="hidden box"></div>

</div>

<script>

let nama="",bahagian=1,skor=0,soalanKe=0;
let jawapanBetul=0,pilihan=[];
let timerInterval,masaMula=0;

function setBackground(){
if(bahagian==1) document.body.style.backgroundImage="url('b1.jpg')";
if(bahagian==2) document.body.style.backgroundImage="url('b2.jpg')";
if(bahagian==3) document.body.style.backgroundImage="url('b3.jpg')";
}

function mulaGame(b){
nama=document.getElementById("nama").value;
if(nama==""){alert("Masukkan nama dahulu"); return;}
bahagian=b;
skor=0;
soalanKe=0;
document.getElementById("menu").classList.add("hidden");
document.getElementById("result").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
setBackground();
document.getElementById("bgmusic").play();
soalanSeterusnya();
}

function soalanSeterusnya(){
soalanKe++;
if(soalanKe>10){ tamatGame(); return;}

document.getElementById("info").innerHTML=
"Nama: "+nama+" | Bahagian "+bahagian+" | Soalan "+soalanKe+"/10";

let q=janaSoalan();
jawapanBetul=q.jawapan;
pilihan=q.pilihan;

document.getElementById("soalan").innerHTML=q.teks;

let btn=document.getElementsByClassName("choice");
for(let i=0;i<4;i++){
btn[i].innerHTML=pilihan[i];
btn[i].className="choice";
}

document.getElementById("status").innerHTML="";
document.getElementById("skor").innerHTML="Skor: "+skor;

masaMula=Date.now();
timerInterval=setInterval(updateTimer,100);
}

function updateTimer(){
let t=(Date.now()-masaMula)/1000;
document.getElementById("timer").innerHTML="Masa: "+t.toFixed(1)+"s";
}

function jawab(i){
clearInterval(timerInterval);
let btn=document.getElementsByClassName("choice");

if(pilihan[i]==jawapanBetul){
skor++;
btn[i].classList.add("correct");
document.getElementById("betul").play();
document.getElementById("status").innerHTML="Betul!";
}else{
btn[i].classList.add("wrong");
document.getElementById("salah").play();
document.getElementById("status").innerHTML="Salah! Jawapan: "+jawapanBetul;
}

document.getElementById("skor").innerHTML="Skor: "+skor;
setTimeout(soalanSeterusnya,1500);
}

function tamatGame(){
document.getElementById("game").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("result").innerHTML=
"<h2>🎉 Tamat!</h2>"+
"<p>"+nama+", skor anda: "+skor+"/10</p>"+
"<button onclick='simpanLeaderboard()'>Simpan</button><br><br>"+
"<button onclick='location.reload()'>Menu Utama</button>";
}

function simpanLeaderboard(){
let data=JSON.parse(localStorage.getItem("leaderboard")||"[]");
data.push({nama:nama, skor:skor, bahagian:bahagian});
data.sort((a,b)=>b.skor-a.skor);
localStorage.setItem("leaderboard",JSON.stringify(data));
alert("Disimpan!");
}

function lihatLeaderboard(){
let data=JSON.parse(localStorage.getItem("leaderboard")||"[]");
let html="<h2>Leaderboard</h2>";
data.slice(0,10).forEach((d,i)=>{
html+=(i+1)+". "+d.nama+" - "+d.skor+
" (Bahagian "+d.bahagian+")<br>";
});
html+="<br><button onclick='location.reload()'>Kembali</button>";
document.getElementById("menu").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("result").innerHTML=html;
}

function janaSoalan(){
let a=Math.floor(Math.random()*11)+2;
let b=Math.floor(Math.random()*11)+2;
let jawapan=a*b;
let arr=[jawapan];
while(arr.length<4){
let r=jawapan+Math.floor(Math.random()*20)-10;
if(r>0 && !arr.includes(r)) arr.push(r);
}
arr.sort(()=>Math.random()-0.5);
return {teks:a+" × "+b+" = ?",jawapan:jawapan,pilihan:arr};
}

</script>
</body>
</html>
