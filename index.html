<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<title>Bijak Sifir PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#74ebd5,#ACB6E5);
text-align:center;
margin:0;
}

#gameBox{

width:520px;
max-width:90%;
margin:auto;
margin-top:40px;

background:white;
padding:20px;
border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,0.2);

}

button{

padding:12px;
margin:6px;
font-size:16px;
width:45%;
border:none;
border-radius:8px;
cursor:pointer;

background:#4CAF50;
color:white;

}

button:hover{

background:#43a047;

}

#question{

font-size:26px;
margin:20px;

}

.correct{

background:#66BB6A !important;

}

.wrong{

background:#EF5350 !important;

}

.stats{

margin:10px;

}

#badge{

font-size:18px;
color:#ff9800;

}

</style>

</head>

<body>

<div id="gameBox">

<h1>🎮 Bijak Sifir PRO</h1>

<div id="menu">

<input id="p1" placeholder="Pemain 1"><br><br>
<input id="p2" placeholder="Pemain 2 (optional)"><br><br>

<button onclick="start('sifir')">Sifir</button>
<button onclick="start('unit')">Tukar Unit</button>
<button onclick="start('problem')">Masalah Matematik</button>

<h3>🏆 Leaderboard</h3>

<ul id="leader"></ul>

</div>

<div id="game" style="display:none">

<h3 id="playerTurn"></h3>

<div class="stats">

❤️ <span id="life">3</span>
🔥 Combo <span id="combo">0</span>
⭐ Skor <span id="score">0</span>

</div>

<div>

⏱ Masa <span id="time">10</span>s

</div>

<div id="badge"></div>

<div id="question"></div>

<div>

<button id="a0" onclick="choose(0)"></button>
<button id="a1" onclick="choose(1)"></button>

<br>

<button id="a2" onclick="choose(2)"></button>
<button id="a3" onclick="choose(3)"></button>

</div>

</div>

</div>

<script>

let players=[]
let turn=0

let score=0
let life=3
let combo=0
let level=1
let correct

let mode=""

let timer
let timeLeft=10

function start(m){

let p1=document.getElementById("p1").value

if(p1==""){
alert("Masukkan nama pemain")
return
}

let p2=document.getElementById("p2").value

players=[p1]

if(p2!=""){
players.push(p2)
}

mode=m

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

resetPlayer()

nextQuestion()

}

function resetPlayer(){

score=0
life=3
combo=0
level=1

updateUI()

}

function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}

function makeQuestion(){

if(mode=="sifir"){

let a=rand(2,9)
let b=rand(2,9)

return{
q:a+" × "+b+" = ?",
a:a*b
}

}

if(mode=="unit"){

let v=rand(1,9)

return{
q:v+" kg = ? g",
a:v*1000
}

}

if(mode=="problem"){

let a=rand(5,15)
let b=rand(1,5)

return{
q:`Ali ada ${a} epal, beli ${b} lagi`,
a:a+b
}

}

}

function nextQuestion(){

let data=makeQuestion()

correct=data.a

document.getElementById("question").innerText=data.q

let arr=[correct]

while(arr.length<4){

let n=correct+rand(-10,10)

if(!arr.includes(n) && n>0)
arr.push(n)

}

arr.sort(()=>Math.random()-0.5)

for(let i=0;i<4;i++){

let b=document.getElementById("a"+i)

b.innerText=arr[i]

b.className=""

}

timeLeft=10

document.getElementById("playerTurn").innerText="Giliran: "+players[turn]

startTimer()

}

function startTimer(){

clearInterval(timer)

timer=setInterval(()=>{

timeLeft--

document.getElementById("time").innerText=timeLeft

if(timeLeft<=0){

life--

combo=0

updateUI()

nextQuestion()

}

},1000)

}

function choose(i){

clearInterval(timer)

let btn=document.getElementById("a"+i)

let val=parseInt(btn.innerText)

if(val==correct){

btn.className="correct"

score+=10

combo++

if(combo>=3){

document.getElementById("badge").innerText="🔥 Combo Master!"
score+=10

}

}else{

btn.className="wrong"

life--

combo=0

}

updateUI()

setTimeout(()=>{

if(life<=0){

endTurn()

}else{

nextQuestion()

}

},800)

}

function updateUI(){

document.getElementById("score").innerText=score
document.getElementById("life").innerText=life
document.getElementById("combo").innerText=combo

}

function endTurn(){

saveScore(players[turn],score)

turn++

if(turn>=players.length){

alert("Game Tamat")

location.reload()

}else{

alert("Giliran pemain seterusnya")

resetPlayer()

nextQuestion()

}

}

function saveScore(name,score){

let data=JSON.parse(localStorage.getItem("score")||"[]")

data.push({name:name,score:score})

data.sort((a,b)=>b.score-a.score)

data=data.slice(0,5)

localStorage.setItem("score",JSON.stringify(data))

}

function loadBoard(){

let data=JSON.parse(localStorage.getItem("score")||"[]")

let ul=document.getElementById("leader")

ul.innerHTML=""

data.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.name+" - "+p.score

ul.appendChild(li)

})

}

loadBoard()

</script>

</body>
</html>
