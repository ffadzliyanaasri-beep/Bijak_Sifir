<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Bijak Sifir</title>

<style>

body{
font-family: Arial;
background:#f0f8ff;
text-align:center;
}

h1{
color:#1E3A5F;
}

#game{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

#question{
font-size:30px;
margin:20px;
}

button{
padding:15px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
width:150px;
}

.btn0{background:#FF6B6B;}
.btn1{background:#4ECDC4;}
.btn2{background:#45B7D1;}
.btn3{background:#FFA07A;}

#score,#timer,#lives,#combo,#level{
font-size:20px;
margin:10px;
}

#leaderboard{
margin-top:30px;
}

</style>

</head>

<body>

<h1>🎮 BIJAK SIFIR</h1>

<div id="menu">
<input id="playerName" placeholder="Masukkan nama pemain">
<br><br>
<button onclick="startGame()">Mula Permainan</button>
</div>

<div id="game" style="display:none">

<div id="level">Level: 1 (Mudah)</div>
<div id="timer">Masa: 0</div>
<div id="lives">Nyawa: ❤️❤️❤️</div>
<div id="combo">Combo: 0</div>
<div id="score">Skor: 0</div>

<div id="question">?</div>

<div>
<button class="btn0" onclick="answer(0)" id="btn0"></button>
<button class="btn1" onclick="answer(1)" id="btn1"></button>
</div>

<div>
<button class="btn2" onclick="answer(2)" id="btn2"></button>
<button class="btn3" onclick="answer(3)" id="btn3"></button>
</div>

</div>

<div id="leaderboard">
<h2>🏆 Leaderboard</h2>
<ul id="board"></ul>
</div>

<script>

let score=0
let lives=3
let combo=0
let level=1
let correct=0
let startTime
let player=""

function startGame(){

player=document.getElementById("playerName").value
if(player=="") player="Pemain"

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

generateQuestion()
startTime=Date.now()

setInterval(updateTimer,100)

}

function generateQuestion(){

let max=5

if(level==2) max=8
if(level==3) max=12

let a=Math.floor(Math.random()*max)+1
let b=Math.floor(Math.random()*max)+1

correct=a*b

document.getElementById("question").innerHTML=
a+" × "+b+" = ?"

let answers=[
correct,
correct+Math.floor(Math.random()*5)+1,
correct-Math.floor(Math.random()*3)+1,
correct+Math.floor(Math.random()*10)+3
]

answers.sort(()=>Math.random()-0.5)

for(let i=0;i<4;i++){
document.getElementById("btn"+i).innerHTML=answers[i]
}

}

function answer(i){

let value=document.getElementById("btn"+i).innerHTML

if(value==correct){

score+=10
combo++

if(combo>=5) levelUp()

alert("✔ Betul!")

}else{

lives--
combo=0
alert("❌ Salah! Jawapan: "+correct)

}

updateUI()

if(lives<=0){
gameOver()
return
}

generateQuestion()

}

function updateUI(){

document.getElementById("score").innerHTML="Skor: "+score
document.getElementById("combo").innerHTML="Combo: "+combo

let hearts=""

for(let i=0;i<lives;i++) hearts+="❤️"

document.getElementById("lives").innerHTML="Nyawa: "+hearts

}

function levelUp(){

if(level<3){
level++
combo=0

let text=["Mudah","Sederhana","Susah"]

document.getElementById("level").innerHTML=
"Level: "+level+" ("+text[level-1]+")"

alert("🚀 Level Up!")
}

}

function updateTimer(){

let t=((Date.now()-startTime)/1000).toFixed(1)

document.getElementById("timer").innerHTML="Masa: "+t

}

function gameOver(){

alert("Game Over! Skor: "+score)

saveScore()

location.reload()

}

function saveScore(){

let board=JSON.parse(localStorage.getItem("sifirBoard")||"[]")

board.push({name:player,score:score})

board.sort((a,b)=>b.score-a.score)

board=board.slice(0,10)

localStorage.setItem("sifirBoard",JSON.stringify(board))

}

function loadBoard(){

let board=JSON.parse(localStorage.getItem("sifirBoard")||"[]")

let html=""

board.forEach(p=>{
html+="<li>"+p.name+" - "+p.score+"</li>"
})

document.getElementById("board").innerHTML=html

}

loadBoard()

</script>

</body>
</html>
