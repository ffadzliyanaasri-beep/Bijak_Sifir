<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Permainan Bijak Sifir</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:Arial, sans-serif;

/* FULL BACKGROUND */
background-image:url("main background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

}

/* MAIN BOX */

.container{

width:550px;
padding:35px;

background:rgba(0,0,0,0.45);

border-radius:20px;

backdrop-filter:blur(8px);

box-shadow:0 10px 40px rgba(0,0,0,0.4);

text-align:center;

}

/* TITLE */

h1{
margin-bottom:20px;
}

/* INPUT */

input{

padding:12px;
width:80%;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:20px;

}

/* BUTTON */

button{

padding:14px 20px;
margin:10px;
font-size:16px;

border:none;
border-radius:10px;

cursor:pointer;

transition:0.3s;

}

/* MENU BUTTON */

.menuBtn{

background:#4ECDC4;
color:white;

}

.menuBtn:hover{

background:#2EA89E;
transform:scale(1.05);

}

/* ANSWER BUTTON */

.answer{

display:block;
width:220px;
margin:10px auto;

background:#ffcc5c;
color:black;

}

.answer:hover{

background:#ffb347;
transform:scale(1.05);

}

/* GAME INFO */

.info{

margin-top:20px;
font-size:18px;

}

#game{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🎮 Permainan Bijak Sifir</h1>

<div id="menu">

<input id="player" placeholder="Masukkan Nama Pemain">

<br>

<button class="menuBtn" onclick="startGame(1)">Bahagian 1 (Sifir)</button>

<button class="menuBtn" onclick="startGame(2)">Bahagian 2 (Unit)</button>

<button class="menuBtn" onclick="startGame(3)">Bahagian 3 (Masalah)</button>

</div>

<div id="game">

<h2 id="playerName"></h2>

<h3 id="question"></h3>

<div id="answers"></div>

<div class="info">

Skor: <span id="score">0</span> |
❤️ Nyawa: <span id="life">3</span> |
🔥 Combo: <span id="combo">0</span> |
📈 Level: <span id="level">1</span> |
⏱ Masa: <span id="timer">20</span>

</div>

</div>

</div>

</body>
</html>
