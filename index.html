<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permainan Bijak Sifir</title>

<style>
/* Pastikan html & body full screen */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

/* Background full screen & responsive */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-image: url("main background.jpg");
    background-size: cover;       
    background-repeat: no-repeat; 
    background-position: center; 
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Heading utama */
h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px #000;
}

/* Input nama */
input#player {
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    width: 250px;
    max-width: 80%;
    text-align: center;
}

/* Button utama & jawapan */
button {
    padding: 14px 20px;
    margin: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.8;
}

/* Jawapan spesifik */
.answer {
    display: block;
    width: 220px;
    max-width: 80%;
    margin: 10px auto;
    background: #4ECDC4;
    color: #fff;
}

.answer:hover {
    background: #2EA89E;
}

/* Container game */
#game {
    display: none;
    width: 90%;
    max-width: 600px;
}

/* Stats game */
p {
    font-size: 1.2rem;
    margin-top: 20px;
    text-shadow: 1px 1px 2px #000;
}

/* Responsive */
@media (max-width: 600px) {
    h1 { font-size: 2rem; }
    button, .answer { font-size: 16px; padding: 12px; }
    p { font-size: 1rem; }
}
</style>

</head>
<body>

<h1>🎮 Permainan Bijak Sifir</h1>

<div id="menu">
    <input id="player" placeholder="Masukkan Nama">
    <br><br>
    <button onclick="startGame(1)">Bahagian 1 (Sifir)</button>
    <button onclick="startGame(2)">Bahagian 2 (Unit)</button>
    <button onclick="startGame(3)">Bahagian 3 (Masalah)</button>
</div>

<div id="game">
    <h2 id="playerName"></h2>
    <h3 id="question"></h3>
    <div id="answers"></div>
    <p>
        Skor: <span id="score">0</span> |
        ❤️ Nyawa: <span id="life">3</span> |
        🔥 Combo: <span id="combo">0</span> |
        📈 Level: <span id="level">1</span> |
        ⏱ Masa: <span id="timer">20</span>
    </p>
</div>

<audio id="music" src="detective-story-224266.mp3" loop></audio>
<audio id="correct" src="correct-356013.mp3"></audio>
<audio id="wrong" src="wrong-47985.mp3"></audio>

<script>
let score=0, life=3, combo=0, level=1, bahagian=1, answer=0, timer=20, interval;

function startGame(b){
    let name=document.getElementById("player").value;
    if(name==""){ alert("Masukkan nama dahulu"); return; }
    bahagian=b;
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("playerName").innerText="👤 "+name;
    document.getElementById("music").play();
    nextQuestion();
}

function startTimer(){
    clearInterval(interval);
    timer=20;
    document.getElementById("timer").innerText=timer;
    interval=setInterval(()=>{
        timer--;
        document.getElementById("timer").innerText=timer;
        if(timer<=0){
            clearInterval(interval);
            wrong();
        }
    },1000);
}

function nextQuestion(){
    let q;
    if(bahagian==1) q=sifir();
    if(bahagian==2) q=unit();
    if(bahagian==3) q=problem();
    document.getElementById("question").innerText=q.text;
    answer=q.answer;
    let html="";
    q.choices.forEach(c=>{
        html+=`<button class="answer" onclick="check(${c})">${c}</button>`;
    });
    document.getElementById("answers").innerHTML=html;
    startTimer();
}

function sifir(){
    let a=rand(2,9), b=rand(2,9);
    let ans=a*b;
    return {text:a+" × "+b+" = ?", answer:ans, choices:shuffle([ans,ans+rand(1,5),ans-rand(1,5),ans+rand(6,10)])};
}

function unit(){
    let v=rand(1,10), ans=v*1000;
    return {text:v+" kg = ? g", answer:ans, choices:shuffle([ans,ans+100,ans-100,ans+500])};
}

function problem(){
    return {text:"Alia ada 32cm + 57cm. Berapa mm?", answer:890, choices:shuffle([890,880,900,89])};
}

function check(v){
    clearInterval(interval);
    if(v==answer){
        document.getElementById("correct").play();
        score++;
        combo++;
        if(combo>=5) level++;
    } else { wrong(); return; }
    update(); nextQuestion();
}

function wrong(){
    document.getElementById("wrong").play();
    life--; combo=0;
    update();
    if(life<=0){ alert("Game Over! Skor: "+score); location.reload(); }
    else{ nextQuestion(); }
}

function update(){
    document.getElementById("score").innerText=score;
    document.getElementById("life").innerText=life;
    document.getElementById("combo").innerText=combo;
    document.getElementById("level").innerText=level;
}

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }
</script>

</body>
</html>
