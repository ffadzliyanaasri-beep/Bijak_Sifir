<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bijak Sifir 2025</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f6ff;
}
.container{
    width:600px;
    margin:auto;
    margin-top:30px;
}
button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}
.choice{
    width:45%;
    margin:10px;
}
.correct{background:#a8ffb0;}
.wrong{background:#ffb0b0;}
.hidden{display:none;}
</style>
</head>
<body>

<div class="container">

<h1>🎮 Permainan Bijak Sifir</h1>

<div id="menu">
<input type="text" id="nama" placeholder="Masukkan Nama"><br><br>
<button onclick="mulaGame(1)">Bahagian 1 (Sifir)</button>
<button onclick="mulaGame(2)">Bahagian 2 (Tukar Unit)</button>
<button onclick="mulaGame(3)">Bahagian 3 (Masalah)</button><br><br>
<button onclick="lihatLeaderboard()">Leaderboard</button>
</div>

<div id="game" class="hidden">
<h3 id="info"></h3>
<h2 id="soalan"></h2>

<div>
<button class="choice" onclick="jawab(0)"></button>
<button class="choice" onclick="jawab(1)"></button><br>
<button class="choice" onclick="jawab(2)"></button>
<button class="choice" onclick="jawab(3)"></button>
</div>

<p id="status"></p>
<p id="timer"></p>
<p id="skor"></p>
</div>

<div id="result" class="hidden"></div>

</div>

<script>

let nama="";
let bahagian=1;
let skor=0;
let soalanKe=0;
let jawapanBetul=0;
let pilihan=[];
let timerInterval;
let masaMula=0;

function mulaGame(b){
nama=document.getElementById("nama").value;
if(nama==""){alert("Masukkan nama dahulu"); return;}
bahagian=b;
skor=0;
soalanKe=0;
document.getElementById("menu").classList.add("hidden");
document.getElementById("result").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
soalanSeterusnya();
}

function soalanSeterusnya(){
soalanKe++;
if(soalanKe>10){ tamatGame(); return;}

document.getElementById("info").innerHTML=
"Nama: "+nama+" | Bahagian "+bahagian+" | Soalan "+soalanKe+"/10";

let q=janaSoalan();
jawapanBetul=q.jawapan;
pilihan=q.pilihan;

document.getElementById("soalan").innerHTML=q.teks;

let btn=document.getElementsByClassName("choice");
for(let i=0;i<4;i++){
btn[i].innerHTML=pilihan[i];
btn[i].className="choice";
}

document.getElementById("status").innerHTML="";
document.getElementById("skor").innerHTML="Skor: "+skor;

masaMula=Date.now();
timerInterval=setInterval(updateTimer,100);
}

function updateTimer(){
let t=(Date.now()-masaMula)/1000;
document.getElementById("timer").innerHTML="Masa: "+t.toFixed(1)+"s";
}

function jawab(i){
clearInterval(timerInterval);
let btn=document.getElementsByClassName("choice");
if(pilihan[i]==jawapanBetul){
skor++;
btn[i].classList.add("correct");
document.getElementById("status").innerHTML="Betul!";
}else{
btn[i].classList.add("wrong");
document.getElementById("status").innerHTML="Salah! Jawapan: "+jawapanBetul;
}
document.getElementById("skor").innerHTML="Skor: "+skor;
setTimeout(soalanSeterusnya,1500);
}

function tamatGame(){
document.getElementById("game").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("result").innerHTML=
"<h2>🎉 Tamat!</h2>"+
"<p>"+nama+", skor anda: "+skor+"/10</p>"+
"<button onclick='simpanLeaderboard()'>Simpan</button><br><br>"+
"<button onclick='location.reload()'>Menu Utama</button>";
}

function simpanLeaderboard(){
let data=JSON.parse(localStorage.getItem("leaderboard")||"[]");
data.push({nama:nama, skor:skor, bahagian:bahagian});
data.sort((a,b)=>b.skor-a.skor);
localStorage.setItem("leaderboard",JSON.stringify(data));
alert("Disimpan!");
}

function lihatLeaderboard(){
let data=JSON.parse(localStorage.getItem("leaderboard")||"[]");
let html="<h2>Leaderboard</h2>";
data.slice(0,10).forEach((d,i)=>{
html+=(i+1)+". "+d.nama+" - "+d.skor+
" (Bahagian "+d.bahagian+")<br>";
});
html+="<br><button onclick='location.reload()'>Kembali</button>";
document.getElementById("menu").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("result").innerHTML=html;
}

/* GENERATOR SOALAN */

function janaSoalan(){
if(bahagian==1) return sifir();
if(bahagian==2) return tukarUnit();
return masalah();
}

function sifir(){
let a=Math.floor(Math.random()*11)+2;
let b=Math.floor(Math.random()*11)+2;
let jawapan=a*b;
return binaPilihan(a+" × "+b+" = ?",jawapan);
}

function tukarUnit(){
let kg=Math.floor(Math.random()*10)+1;
let jawapan=kg*1000;
return binaPilihan(kg+" kg = ? g",jawapan);
}

function masalah(){
let jawapan=24;
return binaPilihan(
"Bekalan air 6000L guna 250L sehari. Berapa hari?",
jawapan);
}

function binaPilihan(teks,jawapan){
let arr=[jawapan];
while(arr.length<4){
let r=jawapan+Math.floor(Math.random()*20)-10;
if(r>0 && !arr.includes(r)) arr.push(r);
}
arr.sort(()=>Math.random()-0.5);
return {teks:teks,jawapan:jawapan,pilihan:arr};
}

</script>
</body>
</html>
