<!DOCTYPE html>

<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bijak Sifir 2025</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

#game{
background:white;
padding:30px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
margin-top:0;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.answer{
width:45%;
background:#4ECDC4;
color:white;
font-weight:bold;
}

.answer:hover{
background:#26a69a;
}

#question{
font-size:22px;
margin:20px 0;
font-weight:bold;
}

#score{
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<div id="game">

<h1>🎮 Bijak Sifir</h1>

<div id="menu">

<input id="player" placeholder="Masukkan Nama" style="padding:10px;width:80%"><br><br>

<button onclick="startGame()">Mula Game</button>

</div>

<div id="play" style="display:none">

<div id="question"></div>

<div>
<button class="answer" onclick="answer(this)"></button>
<button class="answer" onclick="answer(this)"></button>
</div>

<div>
<button class="answer" onclick="answer(this)"></button>
<button class="answer" onclick="answer(this)"></button>
</div>

<div id="score">Skor: 0</div>

</div>

<div id="gameover" style="display:none">

<h2>Game Tamat</h2>

<p id="final"></p>

<button onclick="location.reload()">Main Lagi</button>

</div>

</div>

<script>

let score=0
let correct=0
let q=0

function startGame(){

document.getElementById("menu").style.display="none"
document.getElementById("play").style.display="block"

nextQuestion()

}

function nextQuestion(){

q++

if(q>10){
endGame()
return
}

let a=Math.floor(Math.random()*12)+1
let b=Math.floor(Math.random()*12)+1

correct=a*b

document.getElementById("question").innerHTML=
"Soalan "+q+": "+a+" × "+b+" = ?"

let answers=[correct]

while(answers.length<4){

let n=correct+Math.floor(Math.random()*10)-5

if(n>0 && !answers.includes(n)){
answers.push(n)
}

}

answers.sort(()=>Math.random()-0.5)

let btns=document.querySelectorAll(".answer")

for(let i=0;i<4;i++){
btns[i].innerHTML=answers[i]
}

}

function answer(btn){

let val=parseInt(btn.innerHTML)

if(val===correct){

score+=10
alert("Betul!")

}else{

alert("Salah! Jawapan: "+correct)

}

document.getElementById("score").innerHTML="Skor: "+score

nextQuestion()

}

function endGame(){

document.getElementById("play").style.display="none"
document.getElementById("gameover").style.display="block"

let name=document.getElementById("player").value

document.getElementById("final").innerHTML=
name+" mendapat skor "+score

}

</script>

</body>
</html>
